Warm Up Delay=1.000
Warm Up Keep Time=2.000
Idle Power=20.0
Idle Delay=1.000
Mark Ready Power=50.0
Mark Ready Delay=1.000
Power On Delay=0.300
Power On Waiting=0.000
Mark End Power=-1.000
Mark End Delay=0.000

# Multiwave control line
# Internal(HIGH)/External(LOW) Trigger Mode (Pin-1) : JF7 (Pin-16)
# Laser Emission Enable(HIGH)/Disable(LOW) (Pin-13) : JF7 (pin-15)
# External Trigger (Pin-15) : P2 (Pin-4) -- Laser PWM signal
# Pulse Equalization (Pin-21) : P2 (Pin-2) -- AO2
# Average Optical Power (Pin-29) : P2 (Pin-1) -- AO1
# Pulse Gating On(HIGH)/Off(LOW) (Pin-36) : P2 (Pin-6)  -- Laser On/Off signal
# Warning Alarm active(HIGH) (Pin-42) : JF6 (Pin-15)
# Critical Alarm active(HIGH) (Pin-44) : JF6 (Pin-16)
# Pulse Profile Select Bit-2 (Pin-56) : JF7 (Pin-13)
# Pulse Profile Select Bit-1 (Pin-58) : JF7 (Pin-12)
# Pulse Profile Select Bit-0 (Pin-60) : JF7 (Pin-11)
# Ground (Pin-68)