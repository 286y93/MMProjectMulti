EndDelay=0.00
Shutter_Out=0
Lamp_Out=0
Align_Out=0
Automation=0
Variable Polygon=0
Mark On Fly=0

External Start=0
Get Object Info=0
Recycle=0
Recycle Delay=0.00
Lock Start Signal=0
FPS=10

[MULTIWAVE]
Internal Mode=1
Profile=7
Pulse Equal=25.0

Profile Bit0=111
Profile Bit1=112
Profile Bit2=113
LaserEnable Out=115
TrigMode Out=116

WarningAlarm In=15
CriticalAlarm In=16

[STAND-BY]
Period Time=0
Pulse Width=0

[SOFTSTART]
Enable SoftStart=0
Level-1=100
Level-2=100
Level-3=100
Level-4=100
Level-5=100
Level-6=100
Level-7=100
Level-8=100
Level-9=100
Level-10=100
Level-11=100
Level-12=100
Level-13=100
Level-14=100
Level-15=100
Level-16=100




[POWER]
Enable=0
Power Step=5.0
